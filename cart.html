<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your Buddy Bag - TedBud">
    <title>Your Buddy Bag | TedBud</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- consistent header -->
    <header id="header" class="header solid-header">
        <div class="container header-container">
            <a href="index.html" class="logo">TedBud.</a>
            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="shop.html" class="nav-link">Shop</a></li>
                    <!-- Auth State UI -->
                    <li class="auth-unauthenticated"><a href="login.html" class="button button-secondary"
                            style="display: inline-block;">Login</a></li>
                    <li class="auth-unauthenticated"><a href="register.html" class="button button-primary"
                            style="display: inline-block;">Register</a></li>

                    <!-- Authenticated Dropdown -->
                    <li class="auth-authenticated profile-dropdown-container"
                        style="display: none; position: relative;">
                        <button class="button button-secondary profile-btn" id="nav-user-btn"
                            style="display: flex; align-items: center; gap: 8px; padding-right: 16px;">
                            <span id="nav-user-name">Profile</span>
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M6 9l6 6 6-6" />
                            </svg>
                        </button>
                        <div class="profile-dropdown-content"
                            style="display: none; position: absolute; top: 110%; right: 0; background: var(--color-dark-lighter); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--border-radius); padding: var(--spacing-xs); min-width: 150px; flex-direction: column; gap: 4px; z-index: 100;">
                            <button id="logout-btn" class="button button-secondary"
                                style="width: 100%; text-align: left; border: none; padding: 8px 16px;">Logout</button>
                        </div>
                    </li>

                    <!-- Cart Icon -->
                    <li>
                        <a href="cart.html" class="nav-link cart-link"
                            style="display: flex; align-items: center; gap: 8px;">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="9" cy="21" r="1"></circle>
                                <circle cx="20" cy="21" r="1"></circle>
                                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                            </svg>
                            <span class="cart-count"
                                style="background: var(--color-orange); color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold;">0</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="cart-page">
        <section class="section">
            <div class="container">
                <button onclick="history.back()" class="back-button" style="margin-top: 20px;">
                    <span>← Back</span>
                </button>
                <h1 class="section-title">Your Buddy Bag</h1>

                <div class="cart-grid">
                    <!-- Left: Cart Items -->
                    <div class="cart-items-container" id="cart-items-container">
                        <!-- Items will be injected here via JS -->
                        <div class="empty-cart-message" id="empty-cart-message">
                            <p>Your Buddy Bag is looking a little light.</p>
                            <a href="shop.html" class="button button-primary">Find a New Friend</a>
                        </div>
                    </div>

                    <!-- Right: Summary -->
                    <div class="order-summary" id="order-summary">
                        <h3>Order Summary</h3>
                        <div class="summary-row">
                            <span>Subtotal</span>
                            <span id="cart-subtotal">$0.00</span>
                        </div>
                        <div class="summary-row">
                            <span>Shipping</span>
                            <span>Free</span>
                        </div>
                        <div class="summary-divider"></div>
                        <div class="summary-row total">
                            <span>Total</span>
                            <span id="cart-total">$0.00</span>
                        </div>
                        <button class="button button-primary full-width-btn" id="checkout-btn">Checkout</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container footer-content">
            <div class="footer-col">
                <a href="index.html" class="logo footer-logo">TedBud.</a>
                <p>Bringing warmth, one hug at a time.</p>
            </div>
            <div class="footer-links">
                <a href="shop.html">Shop</a>
                <a href="about.html">About</a>
                <a href="care-guide.html">Care Guide</a>
                <a href="contact.html">Contact</a>
            </div>
            <!-- Old socials replaced by Logo Loop below -->
        </div>

        <!-- Logo Loop Section (Socials) -->
        <div class="logo-loop-section">
            <div class="logo-loop-track" id="logoLoopTrack">
                <!-- Items will be duplicated by JS for infinite loop -->
                <a href="#" class="loop-item"><img src="images/logos/github.svg" alt="GitHub" class="loop-logo"></a>
                <a href="#" class="loop-item"><img src="images/logos/twitter.svg" alt="Twitter" class="loop-logo"></a>
                <a href="#" class="loop-item"><img src="images/logos/instagram.svg" alt="Instagram"
                        class="loop-logo"></a>
                <a href="#" class="loop-item"><img src="images/logos/facebook.svg" alt="Facebook" class="loop-logo"></a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; <span id="year">2026</span> TedBud Co. All rights reserved.</p>
        </div>
    </footer>

    <!-- Razorpay Checkout SDK -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script type="module" src="script.js?v=2"></script>
</body>

</html>
