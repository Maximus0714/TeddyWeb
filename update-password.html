<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Update your TedBud password.">
    <title>Update Password | TedBud</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header id="header" class="header header-visible solid-header">
        <div class="container header-container">
            <a href="index.html" class="logo">TedBud.</a>
        </div>
    </header>

    <main class="auth-page">
        <div class="container auth-container">
            <div class="auth-card fade-in-up">
                <div class="auth-header">
                    <h1 class="auth-title">Set New Password</h1>
                    <p class="auth-subtitle">Please enter your new password below.</p>
                </div>

                <form id="update-password-form" class="auth-form">
                    <div class="form-group">
                        <label for="new-password" class="form-label">New Password</label>
                        <div class="password-input-wrapper" style="position: relative; display: flex; align-items: center; width: 100%;">
                            <input type="password" id="new-password" name="password" class="form-input" placeholder="••••••••" style="padding-right: 40px;" required>
                            <button type="button" class="pwd-toggle-btn" aria-label="Toggle password visibility"
                                style="position: absolute; right: 12px; background: none; border: none; padding: 0; cursor: pointer; color: var(--text-color); opacity: 0.6; display: flex; align-items: center;">
                                <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <p id="update-pwd-msg" style="display: none; font-size: 0.9em; margin-bottom: 15px; color: var(--color-orange);"></p>

                    <button type="submit" class="button button-primary big-btn full-width">Update Password</button>
                </form>
            </div>
        </div>
    </main>

    <script type="module">
        import { supabase } from './supabase-config.js';

        document.addEventListener('DOMContentLoaded', () => {
            const updatePasswordForm = document.getElementById('update-password-form');
            if (!updatePasswordForm) return;

            // Listen for the PASSWORD_RECOVERY event from the email link hash
            supabase.auth.onAuthStateChange(async (event, session) => {
                if (event === 'PASSWORD_RECOVERY') {
                    console.log("Password recovery mode active.");
                }
            });

            // Check if we arrived here with an error in the hash
            const hash = window.location.hash;
            if (hash && hash.includes('error_description')) {
                const params = new URLSearchParams(hash.substring(1));
                const msgEl = document.getElementById('update-pwd-msg');
                msgEl.style.display = 'block';
                msgEl.style.color = '#ff4d4f';
                msgEl.textContent = decodeURIComponent(params.get('error_description').replace(/\+/g, ' '));
            }

            // Password toggle
            const toggleBtn = document.querySelector('.pwd-toggle-btn');
            if (toggleBtn) {
                toggleBtn.addEventListener('click', () => {
                    const input = document.getElementById('new-password');
                    if (input) {
                        input.type = input.type === 'password' ? 'text' : 'password';
                    }
                });
            }

            // Password validation
            const validatePassword = (password) => {
                const hasUpperCase = /[A-Z]/.test(password);
                const hasNumber = /[0-9]/.test(password);
                const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(password);
                return hasUpperCase && hasNumber && hasSpecial;
            };

            updatePasswordForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const newPassword = document.getElementById('new-password').value;
                const btn = updatePasswordForm.querySelector('button');
                const msgEl = document.getElementById('update-pwd-msg');

                if (!validatePassword(newPassword)) {
                    msgEl.style.display = 'block';
                    msgEl.style.color = '#ff4d4f';
                    msgEl.innerHTML = 'Password must contain:<br>- At least one uppercase letter<br>- At least one number<br>- At least one special character';
                    return;
                }

                btn.textContent = 'Updating...';
                btn.style.opacity = '0.8';
                btn.disabled = true;

                const { error } = await supabase.auth.updateUser({ password: newPassword });

                btn.textContent = 'Update Password';
                btn.style.opacity = '1';
                btn.disabled = false;

                msgEl.style.display = 'block';
                if (error) {
                    msgEl.style.color = '#ff4d4f';
                    msgEl.textContent = `Error: ${error.message}`;
                } else {
                    msgEl.style.color = '#4CAF50';
                    msgEl.textContent = 'Password updated successfully! Redirecting to login...';
                    await supabase.auth.signOut();
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                }
            });
        });
    </script>
</body>

</html>
