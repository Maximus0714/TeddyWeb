<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to your TedBud account. Access your order history and saved preferences.">
    <title>Login | TedBud</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header id="header" class="header header-visible solid-header">
        <div class="container header-container">
            <a href="index.html" class="logo">TedBud.</a>
            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="index.html#features" class="nav-link">Craftsmanship</a></li>
                    <li><a href="index.html#testimonials" class="nav-link">Stores</a></li>
                    <!-- Auth State UI -->
                    <li class="auth-unauthenticated"><a href="login.html" class="button button-secondary">Login</a></li>
                    <li class="auth-unauthenticated"><a href="register.html" class="button button-primary">Register</a>
                    </li>

                    <!-- Authenticated Dropdown -->
                    <li class="auth-authenticated profile-dropdown-container"
                        style="display: none; position: relative;">
                        <button class="button button-secondary profile-btn" id="nav-user-btn"
                            style="display: flex; align-items: center; gap: 8px; padding-right: 16px;">
                            <span id="nav-user-name">Profile</span>
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M6 9l6 6 6-6" />
                            </svg>
                        </button>
                        <div class="profile-dropdown-content"
                            style="display: none; position: absolute; top: 110%; right: 0; background: var(--color-dark-lighter); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--border-radius); padding: var(--spacing-xs); min-width: 150px; flex-direction: column; gap: 4px; z-index: 100;">
                            <button id="logout-btn" class="button button-secondary"
                                style="width: 100%; text-align: left; border: none; padding: 8px 16px;">Logout</button>
                        </div>
                    </li>

                    <!-- Cart Icon -->
                    <li>
                        <a href="cart.html" class="nav-link cart-link"
                            style="display: flex; align-items: center; gap: 8px;">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="9" cy="21" r="1"></circle>
                                <circle cx="20" cy="21" r="1"></circle>
                                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                            </svg>
                            <span class="cart-count"
                                style="background: var(--color-orange); color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold;">0</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="auth-page">
        <div class="container auth-container">
            <div class="auth-card fade-in-up">
                <div class="auth-header">
                    <h1 class="auth-title">Welcome Back</h1>
                    <p class="auth-subtitle">Sign in to continue to your TedBud account</p>
                </div>

                <form id="login-form" class="auth-form">
                    <div class="form-group">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com"
                            required>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <div class="password-input-wrapper"
                            style="position: relative; display: flex; align-items: center; width: 100%;">
                            <input type="password" id="password" name="password" class="form-input"
                                placeholder="••••••••" style="padding-right: 40px;" required>
                            <button type="button" class="pwd-toggle-btn" aria-label="Toggle password visibility"
                                style="position: absolute; right: 12px; background: none; border: none; padding: 0; cursor: pointer; color: var(--text-color); opacity: 0.6; display: flex; align-items: center;">
                                <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="form-actions-row">
                        <label class="checkbox-container">
                            <input type="checkbox" name="remember">
                            <span class="checkmark"></span>
                            Remember me
                        </label>
                        <a href="reset-password.html" class="forgot-password">Forgot Password?</a>
                    </div>

                    <button type="submit" class="button button-primary big-btn full-width">Sign In</button>
                </form>

                <div class="auth-footer">
                    <p>Don't have an account? <a href="register.html" class="auth-link">Create one</a></p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container footer-content">
            <div class="footer-col">
                <a href="index.html" class="logo footer-logo">TedBud.</a>
                <p>Bringing warmth, one hug at a time.</p>
            </div>
            <div class="footer-links">
                <a href="shop.html">Shop</a>
                <a href="about.html">About</a>
                <a href="care-guide.html">Care Guide</a>
                <a href="contact.html">Contact</a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; <span id="year">2026</span> TedBud Co. All rights reserved.</p>
        </div>
    </footer>

    <script type="module" src="script.js?v=2"></script>
</body>

</html>
