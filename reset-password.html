<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset your TedBud password.">
    <title>Reset Password | TedBud</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header id="header" class="header header-visible solid-header">
        <div class="container header-container">
            <a href="index.html" class="logo">TedBud.</a>
            <nav class="nav">
                <ul class="nav-list">
                    <li class="auth-unauthenticated"><a href="login.html" class="button button-secondary">Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="auth-page">
        <div class="container auth-container">
            <div class="auth-card fade-in-up">
                <div class="auth-header">
                    <h1 class="auth-title">Reset Password</h1>
                    <p class="auth-subtitle">Enter your email to receive a password reset link.</p>
                </div>

                <form id="reset-request-form" class="auth-form">
                    <div class="form-group">
                        <label for="reset-email" class="form-label">Email Address</label>
                        <input type="email" id="reset-email" name="email" class="form-input" placeholder="you@example.com" required>
                    </div>

                    <p id="reset-request-msg" style="display: none; font-size: 0.9em; margin-bottom: 15px; color: var(--color-orange);"></p>

                    <button type="submit" class="button button-primary big-btn full-width">Send Reset Link</button>
                </form>

                <div class="auth-footer">
                    <p>Remember your password? <a href="login.html" class="auth-link">Back to Login</a></p>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { supabase } from './supabase-config.js?v=2';

        document.addEventListener('DOMContentLoaded', () => {
            const resetRequestForm = document.getElementById('reset-request-form');
            if (!resetRequestForm) return;

            resetRequestForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const email = document.getElementById('reset-email').value;
                const btn = resetRequestForm.querySelector('button');
                const msgEl = document.getElementById('reset-request-msg');

                btn.textContent = 'Sending...';
                btn.style.opacity = '0.8';
                btn.disabled = true;

                console.log('Attempting password reset for:', email);

                const { data, error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: `${window.location.origin}/update-password.html`,
                });

                console.log('Reset response data:', data);
                console.log('Reset response error:', error);

                btn.textContent = 'Send Reset Link';
                btn.style.opacity = '1';
                btn.disabled = false;

                msgEl.style.display = 'block';
                if (error) {
                    msgEl.style.color = '#ff4d4f';
                    msgEl.textContent = `Error: ${error.message}`;
                } else {
                    msgEl.style.color = '#4CAF50';
                    msgEl.textContent = 'Check your email for the reset link!';
                }
            });
        });
    </script>
</body>

</html>
