<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Thank you for your review of TedBud.">
    <title>Thank You | TedBud</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .thankyou-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: var(--spacing-md);
        }

        .thankyou-card {
            background: var(--color-dark-lighter);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--border-radius);
            padding: var(--spacing-lg) var(--spacing-md);
            max-width: 560px;
            width: 100%;
            animation: fadeInUp 0.8s ease forwards;
        }

        .thankyou-icon {
            font-size: 4rem;
            margin-bottom: var(--spacing-sm);
            display: inline-block;
            animation: popIn 0.6s ease 0.3s both;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        .thankyou-title {
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            margin-bottom: var(--spacing-xs);
        }

        .thankyou-message {
            font-size: 1.1rem;
            color: var(--color-text-muted);
            max-width: 400px;
            margin: 0 auto var(--spacing-md);
            line-height: 1.7;
        }

        .thankyou-stars {
            font-size: 1.5rem;
            color: #FFD700;
            letter-spacing: 4px;
            margin-bottom: var(--spacing-md);
            animation: fadeInUp 0.6s ease 0.5s both;
        }

        .thankyou-buttons {
            display: flex;
            gap: var(--spacing-sm);
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 0.6s ease 0.7s both;
        }

        @media (prefers-reduced-motion: reduce) {
            .thankyou-card,
            .thankyou-icon,
            .thankyou-stars,
            .thankyou-buttons {
                animation: none;
                opacity: 1;
                transform: none;
            }
        }
    </style>
</head>

<body>
    <header id="header" class="header header-visible solid-header">
        <div class="container header-container">
            <a href="index.html" class="logo">TedBud.</a>
            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="shop.html" class="nav-link">Shop</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="thankyou-page">
        <div class="thankyou-card">
            <div class="thankyou-icon">🧸</div>
            <h1 class="thankyou-title">Thank You, <span class="text-gradient">Buddy!</span></h1>
            <div class="thankyou-stars">★ ★ ★ ★ ★</div>
            <p class="thankyou-message">
                Your review has been submitted and means the world to us.
                Every word helps us make TedBud even better!
            </p>
            <div class="thankyou-buttons">
                <a href="reviews.html" class="button button-secondary">See All Reviews</a>
                <a href="shop.html" class="button button-primary">Continue Shopping</a>
            </div>
        </div>
    </main>
</body>

</html>
